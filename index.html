<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncZero | User Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { electric: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 900: '#4c1d95' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; color: #1e293b; overflow: hidden; }
        
        .dashboard-card {
            background: white; border-radius: 1rem; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column; overflow: hidden;
        }

        /* WHITEBOARD SPECIFICS */
        .whiteboard-frame {
            border: 8px solid #cbd5e1; /* Silver/Aluminum Frame */
            border-bottom: 16px solid #94a3b8; /* Thicker bottom lip for markers */
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.1);
            position: relative;
        }
        .whiteboard-surface {
            width: 100%; height: 100%;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .marker-text {
            font-family: 'Inter', sans-serif;
            color: #0f172a; /* Dark marker ink */
            font-weight: 700;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .tab-btn.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; background-color: #f5f3ff; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-electric-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">Ø</div>
            <span class="text-lg font-bold tracking-tight text-slate-800">SyncZero</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative group">
                <button class="flex items-center gap-2 hover:bg-slate-50 p-1.5 pr-3 rounded-full border border-transparent hover:border-slate-200 transition">
                    <img src="https://ui-avatars.com/api/?name=Alex+Dev&background=7c3aed&color=fff" class="w-8 h-8 rounded-full">
                    <div class="text-left hidden sm:block">
                        <div id="current-user" class="text-xs font-semibold text-slate-700">Alex Dev</div>
                        <div class="text-[10px] text-slate-400">Lead Architect</div>
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 ml-1"></i>
                </button>
                <div class="absolute right-0 top-full pt-2 w-56 hidden group-hover:block z-50">
                    <div class="bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden">
                        <div class="py-1">
                            <a href="admin.html" class="w-full text-left flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-electric-600 bg-electric-50 hover:bg-electric-100">
                                <i data-lucide="shield" class="w-4 h-4"></i> Enter Admin Console
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-4 grid grid-cols-12 grid-rows-2 gap-4 h-full overflow-hidden">
        
        <div class="col-span-12 md:col-span-7 dashboard-card p-6 relative">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="send" class="w-5 h-5 text-electric-600"></i> Daily Submission</h2>
            </div>
            <div class="flex-grow grid grid-cols-3 gap-4 h-full">
                <div class="flex flex-col gap-2"><label class="text-xs font-bold text-green-600 uppercase tracking-wider">Done</label><textarea class="flex-grow w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-100 outline-none resize-none"></textarea></div>
                <div class="flex flex-col gap-2"><label class="text-xs font-bold text-electric-600 uppercase tracking-wider">Planned</label><textarea class="flex-grow w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-electric-100 outline-none resize-none"></textarea></div>
                <div class="flex flex-col gap-2"><label class="text-xs font-bold text-red-500 uppercase tracking-wider">Blockers</label><textarea class="flex-grow w-full bg-red-50/50 border border-red-100 rounded-lg p-3 text-sm focus:ring-2 focus:ring-red-100 outline-none resize-none"></textarea></div>
            </div>
            <div class="mt-4 flex justify-end gap-3"><button class="bg-electric-600 text-white px-6 py-2 rounded-lg text-sm font-medium shadow-md flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i> Submit</button></div>
        </div>

        <div class="col-span-12 md:col-span-5 dashboard-card p-6">
            <h2 class="text-lg font-bold text-slate-800 mb-6">Team Pulse</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between"><div class="text-sm font-medium">Frontend</div><div class="w-32 h-2 bg-slate-100 rounded-full"><div class="h-full bg-electric-500 w-[98%] rounded-full"></div></div></div>
                <div class="flex items-center justify-between"><div class="text-sm font-medium">Backend</div><div class="w-32 h-2 bg-slate-100 rounded-full"><div class="h-full bg-green-500 w-[92%] rounded-full"></div></div></div>
            </div>
        </div>

        <div class="col-span-12 md:col-span-6 lg:col-span-5 whiteboard-frame flex flex-col relative overflow-hidden">
            <div class="absolute top-3 left-1/2 transform -translate-x-1/2 bg-slate-100 border border-slate-300 shadow-sm px-4 py-1 rounded text-xs font-bold text-slate-500 uppercase tracking-widest z-10">
                Admin Announcements
            </div>

            <div id="wb-canvas" class="whiteboard-surface relative">
                <div class="absolute top-16 left-8 flex flex-col w-64 transform -rotate-1">
                    <div class="marker-text text-xl border-b-2 border-slate-200 pb-1 text-red-600">⚠️ Maintenance</div>
                    <div class="marker-text text-sm mt-1 text-slate-700">Server downtime scheduled for Friday at 10 PM EST. Please save your work!</div>
                </div>
            </div>
        </div>

        <div class="col-span-12 md:col-span-6 lg:col-span-7 dashboard-card flex flex-col">
            <div class="flex border-b border-slate-100 shrink-0">
                <button onclick="switchTab('assigned', this)" class="tab-btn active px-6 py-3 text-xs font-bold uppercase tracking-wide text-slate-500 flex items-center gap-2">
                    <i data-lucide="list-todo" class="w-4 h-4"></i> My Tasks
                </button>
                <button onclick="switchTab('audit', this)" class="tab-btn px-6 py-3 text-xs font-bold uppercase tracking-wide text-slate-500">Files</button>
                <button onclick="switchTab('safebox', this)" class="tab-btn px-6 py-3 text-xs font-bold uppercase tracking-wide text-slate-500 flex items-center gap-2"><i data-lucide="lock" class="w-3 h-3"></i> SafeBox</button>
            </div>
            <div class="flex-grow p-0 relative overflow-hidden">
                
                <div id="tab-assigned" class="h-full flex flex-col p-4 overflow-y-auto custom-scroll bg-slate-50/50">
                    <div id="task-list" class="space-y-3">
                        <div class="text-center text-slate-400 text-sm py-4 italic" id="no-tasks">Connecting to server to fetch tasks...</div>
                        </div>
                </div>

                <div id="tab-audit" class="h-full hidden flex flex-col p-4">
                     <p class="text-sm text-slate-500">Recent files will appear here.</p>
                </div>

                <div id="tab-safebox" class="h-full hidden flex flex-col p-6 bg-slate-50/30">
                    <form class="flex-grow flex flex-col gap-3" onsubmit="event.preventDefault(); alert('Sent Anonymously');">
                        <label class="text-xs font-bold text-slate-500 uppercase">Topic</label>
                        <select class="w-full bg-white border border-slate-200 rounded-lg p-2 text-sm"><option>General Feedback</option></select>
                        <label class="text-xs font-bold text-slate-500 uppercase">Message</label>
                        <textarea class="w-full h-24 bg-white border border-slate-200 rounded-lg p-3 text-sm resize-none" placeholder="Describe the issue..."></textarea>
                        <button type="submit" class="bg-slate-800 text-white py-2 rounded-lg text-sm font-medium flex justify-center items-center gap-2">Send <i data-lucide="lock" class="w-3 h-3 text-slate-400"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        function switchTab(tabId, btn) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- REAL-TIME BACKEND INTEGRATION ---
        
        // 1. Connect to the local Node.js server
        const socket = io('http://localhost:3000');
        const currentUser = document.getElementById('current-user').innerText;
        const taskList = document.getElementById('task-list');

        // 2. Fetch existing tasks on page load
        fetch(`http://localhost:3000/api/tasks/${currentUser}`)
            .then(res => res.json())
            .then(tasks => {
                document.getElementById('no-tasks').style.display = 'none';
                if(tasks.length === 0) {
                    taskList.innerHTML = '<div class="text-center text-slate-400 text-sm py-4 italic">No pending tasks.</div>';
                } else {
                    tasks.forEach(task => renderTask(task));
                }
            })
            .catch(err => {
                document.getElementById('no-tasks').innerText = "Running in Offline Mode (Server not connected).";
            });

        // 3. Listen for new tasks pushed by the Admin in real-time
        socket.on('new-task', (task) => {
            // Check if this task is for the current logged-in user
            if(task.assignedTo === currentUser || task.assignedTo === 'All') {
                document.getElementById('no-tasks').style.display = 'none';
                
                // Remove the "No pending tasks" message if it's there
                if(taskList.innerHTML.includes('No pending tasks')) {
                    taskList.innerHTML = ''; 
                }

                renderTask(task);
                
                // Optional: Play a sound or show a browser notification here
            }
        });

        // Helper function to build the Task HTML block
        function renderTask(task) {
            const el = document.createElement('div');
            el.className = "bg-white border border-slate-200 p-4 rounded-xl shadow-sm border-l-4 animate-in fade-in slide-in-from-right-4 duration-300";
            
            // Color code the priority border
            if(task.priority === 'Critical / Blocker') el.classList.add('border-l-red-500');
            else if(task.priority === 'High Priority') el.classList.add('border-l-orange-400');
            else el.classList.add('border-l-electric-500');

            el.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h4 class="text-sm font-bold text-slate-800">${task.title}</h4>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${getPriorityColors(task.priority)}">${task.priority}</span>
                </div>
                <p class="text-xs text-slate-600 leading-relaxed">${task.description}</p>
                <div class="mt-3 flex justify-between items-center pt-2 border-t border-slate-50">
                    <span class="text-[10px] text-slate-400">Assigned just now</span>
                    <button class="text-[10px] font-bold text-electric-600 hover:text-electric-700 uppercase">Mark Done</button>
                </div>
            `;
            // Add new tasks to the top of the list
            taskList.prepend(el);
        }

        function getPriorityColors(priority) {
            if(priority === 'Critical / Blocker') return 'bg-red-100 text-red-700';
            if(priority === 'High Priority') return 'bg-orange-100 text-orange-700';
            return 'bg-electric-50 text-electric-600';
        }
    </script>
</body>
</html>
